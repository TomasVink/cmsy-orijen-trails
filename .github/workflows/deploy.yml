name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cms: ${{ steps.filter.outputs.cms }}
      web: ${{ steps.filter.outputs.web }}
      nginx: ${{ steps.filter.outputs.nginx }}
      owner: ${{ steps.owner.outputs.owner }}
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cms:
              - 'apps/cms/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
            nginx:
              - 'nginx/**'
              - 'nginx.conf'

  build-cms:
    needs: changes
    if: needs.changes.outputs.cms == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/cms/Dockerfile
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.owner }}/cmsy-orijen-trails-cms:latest
          cache-from: type=gha,scope=cms
          cache-to: type=gha,mode=max,scope=cms

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.owner }}/cmsy-orijen-trails-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-nginx:
    needs: changes
    if: needs.changes.outputs.nginx == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: nginx/Dockerfile
          push: true
          tags: ghcr.io/${{ needs.changes.outputs.owner }}/cmsy-orijen-trails-nginx:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

  deploy:
    needs: [build-cms, build-web, build-nginx]
    # Run if at least one build succeeded and none failed
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: curl -f -s "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}"
