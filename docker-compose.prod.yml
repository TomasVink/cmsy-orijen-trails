# Production Docker Compose for Coolify deployment.
#
# Deploy this file as a "Docker Compose" resource in Coolify.
# Set the domain on the `nginx` service — all other services are internal.
#
# PostgreSQL setup (one-time, before first deploy):
#   This stack connects to the shared PostgreSQL instance running on the Coolify
#   server. Find the internal connection URL in Coolify → your PostgreSQL resource
#   → "Internal Connection URL". It looks like:
#     postgresql://postgres:password@postgresql-[coolify-id]:5432/postgres
#
#   For each new project, create a dedicated database:
#     psql $COOLIFY_POSTGRES_URL -c 'CREATE DATABASE "payload-myproject";'
#   (or use Adminer / any SQL client connected to the internal URL)
#
#   Payload will run migrations automatically on startup and create all
#   tables inside the existing database — it does NOT create the database itself.
#
# Required environment variables (set in Coolify's Environment tab):
#
#   DATABASE_URI     Full connection string to an external PostgreSQL database, e.g.:
#                    postgresql://postgres:pass@postgresql-abc123:5432/payload-myproject
#                    Use the *internal* URL from Coolify — stays on the Docker network.
#
#   PAYLOAD_SECRET   Random secret: openssl rand -hex 32
#   PUBLIC_DOMAIN    Full public URL, e.g. https://my-project.cmsy.digitalestrateeg.com
#
# Optional (S3 media storage):
#   S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY, S3_REGION, S3_ENDPOINT
#
# Optional (Logto OAuth):
#   LOGTO_ENDPOINT, LOGTO_APP_ID, LOGTO_APP_SECRET, LOGTO_ORG_ID
#   LOGTO_M2M_APP_ID, LOGTO_M2M_APP_SECRET
#
# Optional (cms-platform top bar):
#   NEXT_PUBLIC_CMS_PLATFORM_URL, NEXT_PUBLIC_PROJECT_SLUG
#
# Optional (CDN — set alongside S3 to serve media via edge cache):
#   PUBLIC_MEDIA_URL     Public base URL for media, e.g. https://orijen-trails.b-cdn.net

services:
  cms:
    container_name: ${NEXT_PUBLIC_PROJECT_SLUG:-}-cms
    image: ghcr.io/tomasvink/cmsy-orijen-trails-cms:latest
    pull_policy: always
    mem_limit: 8g
    memswap_limit: 8g
    environment:
      DATABASE_URI: ${DATABASE_URI}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      NEXT_PUBLIC_WEB_URL: ${PUBLIC_DOMAIN}
      # Optional
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-}
      LOGTO_ORG_ID: ${LOGTO_ORG_ID:-}
      LOGTO_M2M_APP_ID: ${LOGTO_M2M_APP_ID:-}
      LOGTO_M2M_APP_SECRET: ${LOGTO_M2M_APP_SECRET:-}
      NEXT_PUBLIC_CMS_PLATFORM_URL: ${NEXT_PUBLIC_CMS_PLATFORM_URL:-}
      NEXT_PUBLIC_PROJECT_SLUG: ${NEXT_PUBLIC_PROJECT_SLUG:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - default
    restart: unless-stopped

  web:
    container_name: ${NEXT_PUBLIC_PROJECT_SLUG:-}-web
    image: ghcr.io/tomasvink/cmsy-orijen-trails-web:latest
    pull_policy: always
    environment:
      # Browser-facing URL — used for live preview origin validation
      PUBLIC_PAYLOAD_URL: ${PUBLIC_DOMAIN}
      # CDN base URL for media — browser image requests go here instead of the CMS.
      # Bunny CDN pulls from the CMS on cache miss, then serves from edge.
      # Falls back to PUBLIC_PAYLOAD_URL if not set.
      PUBLIC_MEDIA_URL: ${PUBLIC_MEDIA_URL:-}
      # Internal Docker network URL — used for SSR fetches, never hits nginx
      PAYLOAD_INTERNAL_URL: http://cms:3000
    depends_on:
      - cms
    restart: unless-stopped

  nginx:
    container_name: ${NEXT_PUBLIC_PROJECT_SLUG:-}-nginx
    # Use the stock nginx image — config is embedded below via Docker configs,
    # so no custom image build is needed when nginx.conf changes.
    image: nginx:alpine
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - cms
      - web
    # No ports mapping — Coolify's Traefik routes traffic to this container via labels.
    # Project-specific service name prevents Traefik from merging nginx containers
    # across stacks when multiple projects run on the same Coolify server.
    labels: {}
    expose:
      - "80"
    networks:
      - default  # talks to cms:3000 and web:3001
      - coolify  # Traefik can reach it
    restart: unless-stopped

configs:
  nginx_conf:
    content: |
      server {
          listen 80;

          # Re-resolve upstream hostnames via Docker's embedded DNS every 10 s.
          # Without this nginx caches the IP at startup; if a container restarts
          # and gets a new IP nginx can't reach it until nginx itself restarts.
          resolver 127.0.0.11 valid=10s ipv6=off;

          client_max_body_size 100M;

          # Fail fast instead of hanging when an upstream is down
          proxy_connect_timeout 5s;
          proxy_read_timeout    60s;
          proxy_send_timeout    60s;

          proxy_set_header Host              $$host;
          proxy_set_header X-Real-IP         $$remote_addr;
          proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$http_x_forwarded_proto;

          location /admin {
              set $$cms http://cms:3000;
              proxy_pass $$cms;
          }

          location /api {
              set $$cms http://cms:3000;
              proxy_pass $$cms;
          }

          location /_next {
              set $$cms http://cms:3000;
              proxy_pass $$cms;
          }

          location /media {
              set $$cms http://cms:3000;
              proxy_pass $$cms;
              proxy_hide_header Cache-Control;
              add_header Cache-Control "public, max-age=31536000, immutable" always;
          }

          location ^~ /_app/immutable/ {
              set $$web http://web:3001;
              proxy_pass $$web;
              proxy_http_version 1.1;
              proxy_hide_header Cache-Control;
              add_header Cache-Control "public, max-age=31536000, immutable" always;
          }

          location = /_app/version.json {
              set $$web http://web:3001;
              proxy_pass $$web;
              proxy_http_version 1.1;
              proxy_hide_header Cache-Control;
              add_header Cache-Control "no-cache" always;
          }

          location / {
              set $$web http://web:3001;
              proxy_pass $$web;
              proxy_http_version 1.1;
              proxy_set_header Upgrade    $$http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }

networks:
  default: {}
  coolify:
    external: true
