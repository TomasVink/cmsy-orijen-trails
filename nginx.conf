server {
    listen 80;

    # Re-resolve upstream hostnames via Docker's embedded DNS every 10 s.
    # Without this nginx caches the IP at startup; if a container restarts
    # and gets a new IP nginx can't reach it until nginx itself restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Allow large media uploads
    client_max_body_size 100M;

    # Fail fast instead of hanging when an upstream is down
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # Pass real client IP and protocol from Coolify's Traefik proxy
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # ── Payload CMS paths ──────────────────────────────────────────────────────

    # Admin UI
    location /admin {
        set $cms http://cms:3000;
        proxy_pass $cms;
    }

    # REST & GraphQL API
    location /api {
        set $cms http://cms:3000;
        proxy_pass $cms;
    }

    # Next.js internals (chunks, HMR, RSC payloads)
    location /_next {
        set $cms http://cms:3000;
        proxy_pass $cms;
    }

    # Payload media uploads (local disk storage)
    location /media {
        set $cms http://cms:3000;
        proxy_pass $cms;
    }

    # ── SvelteKit web app ──────────────────────────────────────────────────────

    # Content-hashed immutable assets — safe to cache forever at CDN and browser
    location ^~ /_app/immutable/ {
        set $web http://web:3001;
        proxy_pass $web;
        proxy_http_version 1.1;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SvelteKit version file changes on every deploy — must never be cached
    location = /_app/version.json {
        set $web http://web:3001;
        proxy_pass $web;
        proxy_http_version 1.1;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache" always;
    }

    location / {
        set $web http://web:3001;
        proxy_pass $web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
