upstream cms {
    server cms:3000;
}

upstream web {
    server web:3001;
}

server {
    listen 80;

    # Allow large media uploads
    client_max_body_size 100M;

    # Pass real client IP and protocol from Coolify's Traefik proxy
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # ── Payload CMS paths ──────────────────────────────────────────────────────

    # Admin UI
    location /admin {
        proxy_pass http://cms;
    }

    # REST & GraphQL API
    location /api {
        proxy_pass http://cms;
    }

    # Next.js internals (chunks, HMR, RSC payloads)
    location /_next {
        proxy_pass http://cms;
    }

    # Payload media uploads (local disk storage)
    location /media {
        proxy_pass http://cms;
    }

    # ── SvelteKit web app ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}