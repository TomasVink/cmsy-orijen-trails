upstream cms {
    server cms:3000;
}

upstream web {
    server web:3001;
}

upstream cms {
    server cms:3000;
}

upstream web {
    server web:3001;
}

server {
    listen 80;

    # Allow large media uploads
    client_max_body_size 100M;

    # Re-resolve upstream hostnames dynamically using Docker's embedded DNS.
    # Without this, nginx caches IPs at startup and breaks after any redeploy
    # that assigns a new IP to the cms or web containers.
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Pass real client IP and protocol from Coolify's Traefik proxy
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # ── Payload CMS paths ──────────────────────────────────────────────────────

    # Admin UI
    location /admin {
        set $cms_upstream http://cms:3000;
        proxy_pass $cms_upstream;
    }

    # REST & GraphQL API
    location /api {
        set $cms_upstream http://cms:3000;
        proxy_pass $cms_upstream;
    }

    # Next.js internals (chunks, HMR, RSC payloads)
    location /_next {
        set $cms_upstream http://cms:3000;
        proxy_pass $cms_upstream;
    }

    # Payload media uploads (local disk storage)
    location /media {
        set $cms_upstream http://cms:3000;
        proxy_pass $cms_upstream;
    }

    # ── SvelteKit web app ──────────────────────────────────────────────────────
    location / {
        set $web_upstream http://web:3001;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
